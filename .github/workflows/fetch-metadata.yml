name: Fetch Metadata

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  fetch-metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install node-fetch
        run: npm install node-fetch

      - name: Fetch all folder metadata (with pagination)
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          mkdir -p temp
          
          # Fetch all files from aset folder with pagination
          page=1
          > temp/all_files.json
          
          while true; do
            echo "Fetching page $page..."
            curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/aset?page=$page&per_page=100" \
              -o temp/page_$page.json
            
            # Check if response is empty or error
            if [ ! -s temp/page_$page.json ] || grep -q '"message":' temp/page_$page.json; then
              break
            fi
            
            # Append to all files
            jq -s 'add' temp/all_files.json temp/page_$page.json > temp/merged.json 2>/dev/null || cat temp/page_$page.json >> temp/all_files.json
            mv temp/merged.json temp/all_files.json 2>/dev/null || true
            
            # Check if we got less than 100 files (last page)
            count=$(jq 'length' temp/page_$page.json 2>/dev/null || echo "0")
            if [ "$count" -lt 100 ]; then
              break
            fi
            
            page=$((page + 1))
          done
          
          # Rename final file
          mv temp/all_files.json temp/files.json

      - name: Generate metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const fetch = (...args) => import('node-fetch').then(({ default: fetch }) => fetch(...args));
          
          let files;
          try {
            files = JSON.parse(fs.readFileSync('temp/files.json'));
          } catch(e) {
            console.error('Error reading files.json:', e);
            process.exit(1);
          }
          
          const token = process.env.GITHUB_TOKEN;
          const repo = process.env.GITHUB_REPOSITORY;
          
          (async () => {
            const output = [];
            let processed = 0;
            const total = files.length;
            
            console.log(`Total files found: ${total}`);
            
            for (const file of files) {
              if (!/\.(png|jpe?g|gif|webp|svg)$/i.test(file.name)) continue;
              
              processed++;
              if (processed % 50 === 0) {
                console.log(`Processing ${processed}/${total}...`);
              }
              
              // Fetch commits with pagination to get ALL commits if needed
              let allCommits = [];
              let commitPage = 1;
              let hasMore = true;
              
              while (hasMore && allCommits.length < 100) { // Limit to 100 commits maximum
                const commits = await fetch(`https://api.github.com/repos/${repo}/commits?path=${file.path}&page=${commitPage}&per_page=30`, {
                  headers: {
                    Authorization: 'token ' + token,
                    'User-Agent': 'metadata-script'
                  }
                }).then(r => r.json());
                
                if (Array.isArray(commits) && commits.length > 0) {
                  allCommits = allCommits.concat(commits);
                  commitPage++;
                  if (commits.length < 30) hasMore = false;
                } else {
                  hasMore = false;
                }
              }
              
              const latest = allCommits[0];
              output.push({
                name: file.name,
                path: file.path,
                size: file.size,
                extension: file.name.split('.').pop(),
                date: latest?.commit?.author?.date || null
              });
            }
            
            console.log(`Generated metadata for ${output.length} images`);
            fs.writeFileSync('metadata.json', JSON.stringify(output, null, 2));
          })();
          EOF

      - name: Commit metadata.json
        run: |
          git config user.name "iceinstitut"
          git config user.email "iceinstitut@users.noreply.github.com"
          git add metadata.json
          git commit -m "Update metadata.json" || echo "Nothing to commit"
          git remote set-url origin https://x-access-token:${{ secrets.MY_GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main
